<div class="container-fluid">
    <h3 class="text-center" style="padding-bottom: 10px;">{{ _T["y17e086y"] }}</h3> 
  
  <div class="row" style="display: flex; justify-content: center;">
    <div class="col-lg-10" style="padding-right: 5px;">
      <div class="row">
        <div class="input-group w-100">
          <table class="table table-condensed table-striped">
            <tr ng-repeat="qcStatus in qcsStatus" >
              <td><input id="qcExport_{{$index}}" name="{{qcStatus.type_qc}}" class="inputQcExport" type="checkbox"></td>
              <td>{{qcStatus.type_qc}}  (request id : {{qcStatus.request_id}}) {{qcStatus.final}}</td>
              <td ng-if="qcStatus.status == 'PASS'" style="color: green;">{{qcStatus.status}}</td>
              <td ng-if="qcStatus.status == 'FAILED'" style="color: red;">{{qcStatus.status}}</td>
            </tr>
          </table>
        </div>
      </div>
      <div class="row" style="display: flex; justify-content: center;">
        <button class="btn btn-primary pull-right" style="font-size: 1.25em; color: white; margin-top: 15px;"  ng-click="exportQC(qcsStatus.length)">{{ _T["y17e086y"] }}</button>
      </div>
    </div>
  </div>
</div>
