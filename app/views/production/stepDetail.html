<header class="header-with-tabs">
    <div class="container-fluid container-fixed-nav-aside">
        <div class="col-sm-12">
            <p>
                <a class="btn btn-default btn-lg btn-big-shadow btn-text-primary" ng-if="!isTechnician" href="#/stepList/{{client.id}}" tooltip-placement="right"  data-toggle="tooltip" title="{{ _T['lwfnfxr0'] }}">
                    <i class="c-icon c-icon-arrowLeft"></i></a>
                    {{ _T["82r4brqf"] }} {{::client.name| uppercase}}
                  <button ng-if="isEdit == true && !isTechnician" ng-click="deleteStepList()" role="button" class="btn btn-danger btn-big-shadow pull-right"><i class="c-icon c-icon-trash"></i> {{ _T["m6cmrtkw"] }}</button>
            </p>
        </div>
    </div>

</header>

<div class="container-fluid container-fixed-nav-aside" style="margin-top:50px">
  <div class="panel panel-primary">
    <div class="panel-body">
      <div class="col-md-6">
        <div class="col-md-12">
          <label>{{ _T["amerkryx"] }}</label>
        </div>
        <div class="col-md-12">
          <input class="form-control" ng-model="entity.title" type="text" placeholder="{{ _T['aotmpmow'] }}"/>
        </div>
      </div>
      <div class="col-md-6">
        <div class="col-md-12">
          <label>{{ _T['6p4ckm3s'] }}</label>
        </div>
        <div class=" col-md-12 btn-group btn-group-justified">
          <div class="btn-group">
            <button type="button" ng-class="{'btn-primary' : entity.type_workflow == 1}" class="btn btn-default col-md-4" ng-click="selectWorkflow(1)">
              <i class="fa fa-microphone"></i>
              {{ _T["i5tk31xb"] }}
            </button>
          </div>
          <div class="btn-group">
            <button type="button" ng-class="{'btn-primary' : entity.type_workflow == 2}" class="btn btn-default col-md-4" ng-click="selectWorkflow(2)">
              <i class="fa fa-archive"></i>
              {{ _T["z20ge21k"] }}
            </button>
          </div>
          <div class="btn-group">
            <button type="button" ng-class="{'btn-primary' : entity.type_workflow == 3}" class="btn btn-default col-md-4" ng-click="selectWorkflow(3)">
              <i class="fa fa-briefcase"></i>
              {{ _T["1egq4x9k"] }}
            </button>
          </div>
        </div>
      </div>
      <div class="clearfix"></div>
      <hr/>
      <div class="panel panel-info" ng-show="entity.type_workflow != null">
        <div class="panel-heading">
          <div class="row">
            <div class="col-sm-12">
              <strong>{{ _T["p3mn26xq"] }}</strong>
              <div class="btn-group pull-right" role="group" aria-label="">
                <button class="btn btn-info btn-sm" ng-click="addStep($index)">
                  <i class="glyphicon glyphicon-plus"></i>
                  {{ _T["lhpes36i"] }}</button>
              </div>
            </div>
          </div>
        </div>
        <div class="panel-body">
          <div class="row" ng-repeat="item in steps">
            <div class="col-md-1">
              <label class="pull-right">{{ _T["mn2di6mv"] }} #{{$index + 1}}</label>
            </div>
            <div class="col-md-10">
              <div class="col-md-6">
                <ui-select on-select="showSelectedEtape($item, $index)" ng-model="item.etape_type_id" theme="bootstrap" ng-disabled="disabled" style="width: 100%;">
                  <ui-select-match placeholder="{{ _T['dfuet0tp'] }}">{{$select.selected.value}}</ui-select-match>
                  <ui-select-choices repeat="etape.id as etape in etapes_types | propsFilter: {value: $select.search, id: $select.search}">
                    <div ng-bind-html="etape.value | highlight: $select.search"></div>
                  </ui-select-choices>
                </ui-select>
              </div>
              <div>
                <div class="col-md-6">
                  <ui-select ng-model="item.action_type_id" theme="bootstrap" ng-disabled="disabled" style="width: 100%;">
                    <ui-select-match placeholder="{{ _T['r48ex2km'] }}">{{$select.selected.value}}</ui-select-match>
                    <ui-select-choices repeat="action.id as action in action_types[$index] | propsFilter: {value: $select.search, id: $select.search}">
                      <div ng-bind-html="action.value | highlight: $select.search"></div>
                    </ui-select-choices>
                  </ui-select>
                </div>
              </div>
            </div>
            <div>
              <button class="btn btn-info btn-sm" ng-click="deleteStep($index)">
                <i class="glyphicon glyphicon-minus"></i>
                {{ _T["hbibz5zk"] }}</button>
            </div>
          </div>
        </div>
      </div>
      <hr/>
      <button class="btn btn-success btn-lg pull-right" ng-if="isEdit == false" ng-click="createStepList()">
        <i class="glyphicon glyphicon-send"></i>
        {{ _T["zaqyys0c"] }}
        {{client.name | uppercase}}</button>
      <button class="btn btn-success btn-lg pull-right" ng-if="isEdit == true" ng-click="editStepList()">
        <i class="glyphicon glyphicon-send"></i>
        {{ _T["u9j25thy"] }}
        {{client.name | uppercase}}</button>
    </div>
  </div>
</div>
